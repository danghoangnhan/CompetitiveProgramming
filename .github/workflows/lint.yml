name: lint

on:
  pull_request:
    paths:
      - "bot/**"
      - ".github/workflows/lint.yml"
      - "pyproject.toml"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "bot/[dev]"
      - run: ruff check bot/
      - run: mypy --strict bot/
      - run: pytest bot/ -v
